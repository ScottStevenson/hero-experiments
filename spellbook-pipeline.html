<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spellbook — Contract Pipeline (slow narrative)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; color: #fff; }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
    overflow: hidden;
  }

  .schematic {
    position: absolute;
    top: 32%;
    left: 0;
    right: 0;
    bottom: 5%;
  }
  .schematic svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .line { stroke: #ffffff; stroke-width: 1; fill: none; stroke-linecap: square; }
  .label-box { fill: #000; stroke: #ffffff; stroke-width: 1; }
  .label-text { fill: #ffffff; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 14px; letter-spacing: 0.02em; }

  .review-rect, .cyl { transition: opacity 0.25s ease; }

  .beam {
    stroke: #ffffff;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
  }
  .beam.brand { stroke: #FF4716; }

  .cards-layer {
    position: absolute;
    left: 0;
    right: 0;
    top: 4%;
    height: 26%;
    z-index: 10;
    pointer-events: none;
  }

  .slot {
    position: absolute;
    bottom: 0;
    width: clamp(220px, 22vw, 320px);
    display: flex;
    align-items: flex-end;
    pointer-events: auto;
  }

  .card {
    width: 100%;
    background: rgba(8, 8, 8, 0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 0;
    padding: 16px 18px;
    color: #fff;
    font-size: 13px;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.5s cubic-bezier(.2,.7,.2,1), border-color 0.25s ease;
  }
  .card.show { opacity: 1; transform: translateY(0); }

  .card .eyebrow {
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  .card .eyebrow .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #FF4716;
    box-shadow: 0 0 8px #FF4716;
  }
  .card .eyebrow .dot.alert { background: #FF4716; box-shadow: 0 0 8px #FF4716; }

  .card .ctype-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
  }
  .card .ctype { font-size: 16px; font-weight: 500; letter-spacing: -0.015em; }
  .card .full-name { font-size: 11px; color: rgba(255,255,255,0.5); }
  .card .clause-tag { font-size: 11px; color: rgba(255,255,255,0.55); margin-left: 6px; font-weight: 400; letter-spacing: 0; }

  .card .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px 0;
    font-size: 13px;
  }
  .card .row .label {
    color: rgba(255,255,255,0.55);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 64px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  .card .row .val { color: #fff; }

  .rule {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 6px 0;
    font-size: 12.5px;
  }
  .rule .icon {
    width: 14px; height: 14px;
    display: inline-block;
    flex-shrink: 0;
  }
  .card .icon svg {
    display: block;
    width: 100%;
    height: 100%;
  }
  .rule.pass { color: rgba(255,255,255,0.95); }
  .rule.pass .icon { color: #1ED760; }
  .rule.fail { color: rgba(255,255,255,0.95); }
  .rule.fail .icon { color: #FF4716; }

  /* Redlining card */
  .card.redline { border-color: rgba(255, 71, 22, 0.4); }
  .redline-quote {
    font-size: 12.5px;
    line-height: 1.6;
    color: rgba(255,255,255,0.92);
    font-style: italic;
    margin-top: 4px;
  }
  .rl-del {
    color: #FF4716;
    text-decoration: line-through;
    text-decoration-color: #FF4716;
    text-decoration-thickness: 1.5px;
  }
  .rl-ins {
    color: #1ED760;
    background: rgba(30, 215, 96, 0.08);
    padding: 0 2px;
    margin: 0 1px;
  }

  .insight-text {
    font-size: 14px;
    line-height: 1.45;
    letter-spacing: -0.005em;
    color: #fff;
  }
  .insight-meta {
    margin-top: 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.04em;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  .card.alert { border-color: rgba(255, 71, 22, 0.35); }
</style>
</head>

</div>

const rand = a => a[Math.floor(Math.random()*a.length)];
const sample = (a,n) => [...a].sort(()=>Math.random()-0.5).slice(0,n);
const ICON_CHECK = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 7L6 10.5L11.5 4"/></svg>`;
const ICON_X = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3.5 3.5L10.5 10.5"/><path d="M10.5 3.5L3.5 10.5"/></svg>`;
const ICON_ALERT = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M7 1.5L13 12.5H1L7 1.5Z"/><path d="M7 6V8.5" stroke-linecap="round"/><circle cx="7" cy="10.5" r="0.6" fill="currentColor" stroke="none"/></svg>`;

function renderRedline(text) {
  return text
    .replace(/\[del\](.*?)\[\/del\]/g, '<span class="rl-del">$1</span>')
    .replace(/\[ins\](.*?)\[\/ins\]/g, '<span class="rl-ins">$1</span>');
}

// ============================================================
//  CARD BUILDERS
// ============================================================
function buildIntakeCard(c) {
  const source = rand(c.sources);
  const team = rand(c.teams);
  return {
    cls: '',
    html: `
      <div class="eyebrow"><span class="dot"></span>INTAKE</div>
      <div class="ctype-row">
        <div class="ctype">${c.type}</div>
        <div class="full-name">${c.fullName}</div>
      </div>
      <div class="row"><span class="label">Source</span><span class="val">${source}</span></div>
      <div class="row"><span class="label">Team</span><span class="val">${team}</span></div>
    `
  };
}

function buildReviewCard(c) {
  const r = Math.random();
  // ~50% chance: live redlining card with an actual snippet
  if (r < 0.50 && c.redlines && c.redlines.length) {
    const rl = rand(c.redlines);
    return {
      cls: 'redline',
      html: `
        <div class="eyebrow"><span class="dot" style="background:#FF4716;box-shadow:0 0 8px #FF4716;"></span>REDLINING</div>
        <div class="ctype-row">
          <div class="ctype">${c.type}<span class="clause-tag">— ${rl.clause}</span></div>
        </div>
        <div class="redline-quote">"${renderRedline(rl.text)}"</div>
      `
    };
  }
  const n = 3 + Math.floor(Math.random() * 2);
  const chosen = sample(c.rules, Math.min(n, c.rules.length));
  const failIdx = Math.random() < 0.55 ? Math.floor(Math.random() * chosen.length) : -1;
  const rows = chosen.map((rule, i) => {
    const pass = i !== failIdx;
    return `<div class="rule ${pass ? 'pass' : 'fail'}"><span class="icon">${pass ? ICON_CHECK : ICON_X}</span>${rule}</div>`;
  }).join('');
  return {
    cls: '',
    html: `
      <div class="eyebrow"><span class="dot"></span>REVIEW</div>
      <div class="ctype-row">
        <div class="ctype">${c.type}</div>
        <div class="full-name">${c.fullName}</div>
      </div>
      ${rows}
    `
  };
}

function buildInsightCard(c) {
  const ins = rand(c.insights);
  return {
    cls: ins.alert ? 'alert' : '',
    html: `
      <div class="eyebrow">
        <span class="dot ${ins.alert ? 'alert' : ''}"></span>
        ${ins.alert ? 'RISK ALERT' : 'INSIGHT'}
      </div>
      <div class="insight-text">
        ${ins.alert ? `<span style="display:inline-block;vertical-align:-2px;width:14px;height:14px;color:#FF4716;margin-right:6px;">${ICON_ALERT}</span>` : ''}
        ${ins.text}
      </div>
      <div class="insight-meta">${c.type} · ${c.fullName}</div>
    `
  };
}

// ============================================================
//  CARD POSITIONING
// ============================================================
const anchorPoints = {
  intake:  { x: 250 },
  review:  { x: 920 },
  insight: { x: 1800 }
};

function positionCards() {
  const svg = document.getElementById('canvas');
  const stage = document.querySelector('.stage');
  if (!svg || !stage) return;
  const ctm = svg.getScreenCTM();
  if (!ctm) return;
  const stageRect = stage.getBoundingClientRect();

  ['intake', 'review', 'insight'].forEach(name => {
    const slot = document.getElementById(`slot-${name}`);
    if (!slot) return;
    const pt = svg.createSVGPoint();
    pt.x = anchorPoints[name].x;
    pt.y = 0;
    const screenX = pt.matrixTransform(ctm).x;
    const xInStage = screenX - stageRect.left;
    const cardW = slot.offsetWidth || 280;
    const padding = 16;
    let left = xInStage - cardW / 2;
    left = Math.max(padding, Math.min(left, stageRect.width - cardW - padding));
    slot.style.left = `${left}px`;
  });
}

let _resizeT;
window.addEventListener('resize', () => {
  clearTimeout(_resizeT);
  _resizeT = setTimeout(positionCards, 50);
});
window.addEventListener('load', positionCards);
requestAnimationFrame(() => requestAnimationFrame(positionCards));

// ============================================================
//  CARD DISPLAY (cumulative — no auto-hide)
// ============================================================
const slots = {
  intake: document.getElementById('slot-intake'),
  review: document.getElementById('slot-review'),
  insight: document.getElementById('slot-insight')
};
const activeCard = { intake: null, review: null, insight: null };

function showCard(stage, contract) {
  let built;
  if (stage === 'intake') built = buildIntakeCard(contract);
  else if (stage === 'review') built = buildReviewCard(contract);
  else built = buildInsightCard(contract);

  // Replace existing card in this slot (in case one is leftover)
  if (activeCard[stage]) {
    const old = activeCard[stage];
    old.classList.remove('show');
    setTimeout(() => old.remove(), 350);
  }

  const card = document.createElement('div');
  card.className = `card ${built.cls}`;
  card.innerHTML = built.html;
  slots[stage].appendChild(card);
  activeCard[stage] = card;
  requestAnimationFrame(() => {
    positionCards();
    requestAnimationFrame(() => card.classList.add('show'));
  });
}

function hideAllCards() {
  ['intake', 'review', 'insight'].forEach(s => {
    if (activeCard[s]) {
      const old = activeCard[s];
      old.classList.remove('show');
      setTimeout(() => { if (old.parentNode) old.remove(); }, 450);
      activeCard[s] = null;
    }
  });
}

// ============================================================
//  BEAM ANIMATION (slow narrative — triggers all 3 stages)
// ============================================================
const NS = 'http://www.w3.org/2000/svg';
const beamsGroup = document.getElementById('beams');
const reviewRect = document.getElementById('reviewRect');
const insightCyl = document.getElementById('insightCyl');
const fanLines = Array.from(document.querySelectorAll('.fanline'));

const FAN_TIP_X = 250;
const FAN_TIP_Y = 240;
const PIPE_END_X = 1710;

const stagePipeX = {
  intake:  FAN_TIP_X + 40,
  review:  920,
  insight: 1660
};

const reviewBounds = { x1: 720, x2: 1120 };

const BEAM_DURATION   = 6500;   // 6.5 s for the contract to flow
const HOLD_AFTER_BEAM = 2500;   // hold all 3 cards visible for 2.5 s
const FADE_DURATION   = 500;    // card fade-out time
const PAUSE_BETWEEN   = 900;    // pause before next contract

// Track in-flight beams so we can cancel them cleanly on tab visibility change
const activeBeams = new Set();

function shootBeam() {
  // ONE contract for the whole journey — all 3 cards relate to it
  const contract = rand(contractTypes);
  const useBrand = Math.random() < 0.18;

  const fan = rand(fanLines);
  const fanStartX = +fan.getAttribute('x1');
  const fanStartY = +fan.getAttribute('y1');

  const pathD = `M ${fanStartX},${fanStartY} L ${FAN_TIP_X},${FAN_TIP_Y} L ${PIPE_END_X},${FAN_TIP_Y}`;
  const beam = document.createElementNS(NS, 'path');
  beam.setAttribute('d', pathD);
  beam.setAttribute('class', useBrand ? 'beam brand' : 'beam');
  beam.setAttribute('filter', 'url(#beam-glow)');
  beam._cancelled = false;
  beamsGroup.appendChild(beam);
  activeBeams.add(beam);

  // Compute path length manually — beam.getTotalLength() can return 0 if
  // called before layout settles (especially with a filter attached).
  const fanSegLen = Math.hypot(FAN_TIP_X - fanStartX, FAN_TIP_Y - fanStartY);
  const pipeSegLen = PIPE_END_X - FAN_TIP_X;
  const total = fanSegLen + pipeSegLen;
  const beamLen = 130;
  const motion = total + beamLen;

  beam.style.strokeDasharray = `${beamLen} ${total}`;
  beam.style.strokeDashoffset = `${beamLen}`;

  const triggerDist = {
    intake:  fanSegLen + (stagePipeX.intake  - FAN_TIP_X),
    review:  fanSegLen + (stagePipeX.review  - FAN_TIP_X),
    insight: fanSegLen + (stagePipeX.insight - FAN_TIP_X)
  };

  const start = performance.now();
  let lastTickTime = start;
  const triggered = { intake: false, review: false, insight: false };
  let inReview = false, inInsight = false;

  function cleanup() {
    activeBeams.delete(beam);
    if (beam.parentNode) beam.remove();
  }

  function tick(now) {
    if (beam._cancelled) { cleanup(); return; }

    // Detect a long pause between frames (tab was backgrounded mid-beam) and
    // bail out cleanly so we don't trigger all 3 cards in a single frame.
    if (now - lastTickTime > 1000) { cleanup(); return; }
    lastTickTime = now;

    const t = Math.min(1, (now - start) / BEAM_DURATION);
    const head = t * motion;
    beam.style.strokeDashoffset = `${beamLen - head}`;

    if (!triggered.intake && head >= triggerDist.intake) {
      triggered.intake = true;
      showCard('intake', contract);
    }
    if (!triggered.review && head >= triggerDist.review) {
      triggered.review = true;
      showCard('review', contract);
    }
    if (!triggered.insight && head >= triggerDist.insight) {
      triggered.insight = true;
      showCard('insight', contract);
    }

    if (head >= fanSegLen) {
      const headPipeX = FAN_TIP_X + (head - fanSegLen);
      if (!inReview && headPipeX >= reviewBounds.x1 && headPipeX <= reviewBounds.x2) {
        inReview = true;
        reviewRect.setAttribute('filter', 'url(#comp-glow)');
      } else if (inReview && headPipeX > reviewBounds.x2) {
        inReview = false;
        setTimeout(() => reviewRect.removeAttribute('filter'), 250);
      }
      if (!inInsight && headPipeX >= 1660) {
        inInsight = true;
        insightCyl.setAttribute('filter', 'url(#comp-glow)');
        setTimeout(() => insightCyl.removeAttribute('filter'), 1200);
      }
    }

    if (t < 1) requestAnimationFrame(tick);
    else cleanup();
  }
  requestAnimationFrame(tick);
}

// ============================================================
//  MAIN CYCLE — visibility-aware
//   - shoot beam (6.5 s)
//   - hold all 3 cards visible (2.5 s)
//   - fade all (0.5 s)
//   - pause (0.9 s)
//   - repeat
//
//  When the tab becomes hidden, we cancel any in-flight beam and pause the
//  cycle. setTimeout still fires while a tab is backgrounded but RAF doesn't,
//  so without this guard a hidden iteration would create a beam that never
//  animated, and on return the beam would be skipped entirely.
// ============================================================
let cycleTimeout = null;

function cycle() {
  if (document.hidden) { cycleTimeout = null; return; }
  shootBeam();
  cycleTimeout = setTimeout(() => {
    hideAllCards();
    cycleTimeout = setTimeout(() => {
      cycleTimeout = null;
      cycle();
    }, FADE_DURATION + PAUSE_BETWEEN);
  }, BEAM_DURATION + HOLD_AFTER_BEAM);
}

function stopCycle() {
  if (cycleTimeout) { clearTimeout(cycleTimeout); cycleTimeout = null; }
  activeBeams.forEach(b => { b._cancelled = true; if (b.parentNode) b.remove(); });
  activeBeams.clear();
  hideAllCards();
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopCycle();
  } else if (!cycleTimeout) {
    setTimeout(cycle, 300);
  }
});

setTimeout(() => { if (!document.hidden) cycle(); }, 800);
</script>
</body>
